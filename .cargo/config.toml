[build]
# This template targets the ESP32-S3 (Xtensa).
target = "xtensa-esp32s3-espidf"

[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32s3"
ESP_IDF_VERSION = "v5.5.3"
ESP_IDF_TOOLS_INSTALL_DIR = "global"

# In a Cargo workspace esp-idf-sys can't infer which member crate's
# `[package.metadata.esp-idf-sys.extra_components]` it should honour, so the
# extra_components list comes back empty. Naming the firmware crate
# explicitly makes the build script pick up its metadata.
ESP_IDF_SYS_ROOT_CRATE = "esp32-rust-c-hid-example"

# Path to sdkconfig.defaults, resolved from this config.toml (workspace root).
# The relative path in `[package.metadata.esp-idf-sys]` doesn't get applied
# from the workspace root, so override via env to be sure.
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "crates/firmware/sdkconfig.defaults", relative = true }

# Copy the custom partition table into the esp-idf build output directory
# (required because CONFIG_PARTITION_TABLE_CUSTOM_FILENAME resolves relative
# to that output dir, not the project root). BASE is resolved relative to
# this config.toml (the workspace root); the firmware crate lives under
# crates/firmware/.
ESP_IDF_GLOB_FIRMWARE_BASE = { value = "crates/firmware", relative = true }
ESP_IDF_GLOB_FIRMWARE_PARTITIONS = "partitions.csv"

# When espressif/esp_tinyusb is added as a remote component, esp-idf-sys
# emits -DESP_IDF_COMP_ESPRESSIF__ESP_TINYUSB_ENABLED to its bindgen clang
# pass. That macro makes ESP-IDF umbrella headers pull in TinyUSB headers,
# which produce type conflicts against bindings esp-idf-sys has already
# generated. The -U flag undefines the macro before bindgen processes any
# header, preventing the conflict. bindgen 0.61+ reads this env var via its
# Rust API, so esp-idf-sys's build script picks it up from here.
BINDGEN_EXTRA_CLANG_ARGS = "-UESP_IDF_COMP_ESPRESSIF__ESP_TINYUSB_ENABLED"
