[build]
# This template targets the ESP32-S3 (Xtensa).
target = "xtensa-esp32s3-espidf"

[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32s3"
ESP_IDF_VERSION = "v5.5.3"
# "fromenv" reuses the ESP-IDF toolchain you sourced with export.sh instead of
# downloading a fresh copy into the target dir.
ESP_IDF_TOOLS_INSTALL_DIR = "global"
